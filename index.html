<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f6eee7" />
  <title>今これ</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">生活ログから、いま一番軽い一手を出す</p>
        <h1>今これ</h1>
      </div>
      <button class="ghost small" id="resetBtn" type="button">初期化</button>
    </header>

    <main>
      <section class="tab-panel active" id="tab-now">
        <div class="hero card">
          <div class="hero-text">
            <p class="label">スマホに逃げそうな瞬間用</p>
            <h2 id="suggestionTitle">机を10秒だけ拭く</h2>
            <p id="suggestionMeta">整える・1分・だるい日OK</p>
          </div>
          <div class="hero-actions">
            <button class="primary" id="doneBtn" type="button">できた</button>
            <button class="secondary" id="nextBtn" type="button">別の候補</button>
            <button class="ghost" id="lighterBtn" type="button">もっと軽く</button>
          </div>
        </div>

        <section class="card">
          <h3>今の状態</h3>
          <div class="chip-grid" id="modeChips"></div>
          <div class="mini-row">
            <button class="secondary" data-time="1" type="button">1分</button>
            <button class="secondary" data-time="5" type="button">5分</button>
            <button class="secondary" data-time="15" type="button">15分</button>
            <button class="secondary" data-time="30" type="button">30分</button>
          </div>
        </section>

        <section class="card">
          <div class="section-head">
            <h3>今日の小さい候補</h3>
            <button class="ghost small" id="shuffleListBtn" type="button">入れ替え</button>
          </div>
          <div id="quickList" class="quick-list"></div>
        </section>
      </section>

      <section class="tab-panel" id="tab-materials">
        <section class="card">
          <h2>材料</h2>
          <p class="muted">やりたいこと・気になること・詰まりを、雑に入れておく場所です。</p>
          <textarea id="brainDump" rows="7" placeholder="例：TOEICをまた勉強したい。AI画像制作を進めたい。部屋が散らかっている。旅行準備が気になる。"></textarea>
          <div class="mini-row">
            <button class="primary" id="saveDumpBtn" type="button">材料として保存</button>
            <button class="secondary" id="makeStepsBtn" type="button">小さい行動に分ける</button>
          </div>
        </section>
        <section class="card">
          <div class="section-head">
            <h3>材料リスト</h3>
            <button class="ghost small" id="clearMaterialsBtn" type="button">整理</button>
          </div>
          <div id="materialsList" class="stack"></div>
        </section>
        <section class="card">
          <h3>ChatGPTに貼る用</h3>
          <p class="muted">本物のAI整理をしたい時用です。コピーしてChatGPTに貼れます。</p>
          <textarea id="promptBox" rows="6" readonly></textarea>
          <button class="secondary" id="copyPromptBtn" type="button">コピー</button>
        </section>
      </section>

      <section class="tab-panel" id="tab-buy">
        <section class="card">
          <h2>買う</h2>
          <div class="form-grid">
            <input id="buyName" placeholder="買うもの" />
            <input id="buyPlace" placeholder="店・通販先" />
            <input id="buyPrice" placeholder="値段・底値メモ" />
          </div>
          <button class="primary" id="addBuyBtn" type="button">追加</button>
        </section>
        <section class="card"><div id="buyList" class="stack"></div></section>
      </section>

      <section class="tab-panel" id="tab-care">
        <section class="card">
          <h2>整える</h2>
          <div class="form-grid">
            <input id="careName" placeholder="施術・メンテ名" />
            <input id="careCategory" placeholder="カテゴリ 例：美容医療/ヘア/脱毛" />
            <input id="careDate" type="date" />
            <input id="careMemo" placeholder="金額・満足度・メモ" />
          </div>
          <button class="primary" id="addCareBtn" type="button">記録する</button>
        </section>
        <section class="card"><div id="careList" class="stack"></div></section>
      </section>

      <section class="tab-panel" id="tab-log">
        <section class="card">
          <h2>記録</h2>
          <p class="muted">やったことは、大小問わずここに残します。皿1枚でもOKです。</p>
          <div id="doneList" class="stack"></div>
        </section>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="メイン">
      <button class="nav active" data-tab="now" type="button">今これ</button>
      <button class="nav" data-tab="materials" type="button">材料</button>
      <button class="nav" data-tab="buy" type="button">買う</button>
      <button class="nav" data-tab="care" type="button">整える</button>
      <button class="nav" data-tab="log" type="button">記録</button>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
